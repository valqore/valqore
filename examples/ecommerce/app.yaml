apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: production
  labels:
    app: storefront
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storefront
  template:
    metadata:
      labels:
        app: storefront
    spec:
      containers:
      - name: web
        image: node:18
        command: ["node", "server.js"]
        ports:
        - containerPort: 3000
        env:
        - name: STRIPE_SECRET_KEY
          value: "sk_live_abc123xyz"
        - name: DB_CONNECTION
          value: "postgresql://admin:password@db:5432/store"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: production
  labels:
    app: cart-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
      - name: cart
        image: redis:latest
        ports:
        - containerPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: production
  labels:
    app: payment-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-gateway
  template:
    metadata:
      labels:
        app: payment-gateway
    spec:
      containers:
      - name: payment
        image: myregistry/payment:v2.1
        ports:
        - containerPort: 8080
        securityContext:
          privileged: true
        env:
        - name: PCI_MODE
          value: "production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: production
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: db
        image: postgres:14
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          value: "admin123"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: storefront
  namespace: production
spec:
  type: LoadBalancer
  selector:
    app: storefront
  ports:
  - port: 80
    targetPort: 3000
