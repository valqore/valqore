apiVersion: apps/v1
kind: Deployment
metadata:
  name: mvp-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mvp
  template:
    metadata:
      labels:
        app: mvp
    spec:
      containers:
      - name: app
        image: node:20
        command: ["npm", "start"]
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: MONGODB_URI
          value: "mongodb+srv://admin:pass123@cluster.mongodb.net/mydb"
      - name: mongo
        image: mongo:7
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: db-data
          mountPath: /data/db
      volumes:
      - name: db-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mvp-app
  namespace: default
spec:
  type: NodePort
  selector:
    app: mvp
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30080
